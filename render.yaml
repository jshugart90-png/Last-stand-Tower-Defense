services:
  - type: web
    name: last-stand-td-api
    runtime: python
    repo: https://github.com/jshugart90-png/Last-stand-Tower-Defense
    branch: main
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_PROVIDER
        value: supabase
      - key: SUPABASE_DB_SCHEMA
        value: public
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APPLE_SHARED_SECRET
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_ISSUER_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.horseshoeroundme.laststandtowerdefense
      - key: GOOGLE_PLAY_PACKAGE_NAME
        value: com.horseshoeroundme.laststandtowerdefense
      - key: GOOGLE_PLAY_ACCESS_TOKEN
        sync: false
